<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - PrimeAcis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #2a2a2a;
            color: #fff;
        }

        header {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-left: 2rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #fff;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .title-container {
            position: relative;
            margin-bottom: 3rem;
        }


        .page-title {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            position: relative;
            z-index: 1;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 3rem 4rem;
            text-align: center;
        }

        .contact-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }

        .contact-email {
            font-size: 1.4rem;
            font-weight: 500;
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-email:hover {
            color: rgba(139, 92, 246, 0.9);
        }

        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            padding: 1.5rem 2rem;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem 1.5rem;
            }

            .page-title {
                font-size: 2.2rem;
            }

            .contact-card {
                padding: 2rem;
            }

            .contact-email {
                font-size: 1.1rem;
            }

            nav a {
                margin-left: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">PrimeAcis</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <div class="title-container">
            <h1 class="page-title">Contact Us</h1>
        </div>
        <div class="contact-card">
            <p class="contact-label">Email</p>
            <a href="mailto:info@prime-acis.com" class="contact-email">info@prime-acis.com</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 PrimeAcis. All rights reserved.</p>
    </footer>
</body>
</html>
