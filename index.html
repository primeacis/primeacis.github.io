<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeAcis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #6b6b6b;
            color: #fff;
        }

        header {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            text-decoration: none;
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-left: 2rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #fff;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .name-container {
            position: relative;
            padding: 4rem 6rem;
        }

        .company-logo {
            max-width: 400px;
            width: 100%;
            height: auto;
            position: relative;
            z-index: 1;
        }

        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 1.5rem 2rem;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem 1.5rem;
            }

            .name-container {
                padding: 2rem;
            }

            .company-logo {
                max-width: 280px;
            }

            nav a {
                margin-left: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo"><img src="logo.png" alt="PrimeAcis"></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <div class="name-container">
            <img src="logo.png" alt="PrimeAcis" class="company-logo">
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Primeacis LLC. All rights reserved.</p>
    </footer>
</body>
</html>
