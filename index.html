<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeAcis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1a1d2e;
            color: #fff;
        }

        header {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        nav a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-left: 2rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #fff;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .name-container {
            position: relative;
            padding: 4rem 6rem;
        }

        .name-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 140%;
            background: radial-gradient(ellipse at center, rgba(60, 60, 80, 0.9) 0%, rgba(40, 45, 60, 0.7) 30%, rgba(20, 25, 35, 0.5) 60%, transparent 80%);
            z-index: 0;
            border-radius: 50%;
        }

        .company-name {
            font-family: 'Outfit', sans-serif;
            font-size: 5.5rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.04em;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            padding: 1.5rem 2rem;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem 1.5rem;
            }

            .name-container {
                padding: 2rem;
            }

            .company-name {
                font-size: 2.8rem;
            }

            nav a {
                margin-left: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">PrimeAcis</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <div class="name-container">
            <h1 class="company-name">PrimeAcis</h1>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 PrimeAcis. All rights reserved.</p>
    </footer>
</body>
</html>
